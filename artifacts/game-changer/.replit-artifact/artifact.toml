kind = "web"
previewPath = "/"
title = "Game Changer — REM16™"
version = "1.0.0"
id = "artifacts/game-changer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19819
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/game-changer run dev"

[services.env]
PORT = "19819"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/game-changer", "run", "build"]
publicDir = "artifacts/game-changer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
