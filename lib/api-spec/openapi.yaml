openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Game Changer REM16 Framework API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: surveys
    description: Stakeholder survey operations
  - name: projects
    description: Project context management
  - name: messages
    description: AI-generated message management
  - name: dashboard
    description: Dashboard and analytics
  - name: storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /surveys:
    post:
      operationId: submitSurvey
      tags: [surveys]
      summary: Submit a stakeholder survey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyInput"
      responses:
        "201":
          description: Survey submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyResponse"
    get:
      operationId: getSurveys
      tags: [surveys]
      summary: Get all survey responses
      responses:
        "200":
          description: List of surveys
          content:
            application/json:
              schema:
                type: object
                properties:
                  surveys:
                    type: array
                    items:
                      $ref: "#/components/schemas/SurveyResponse"
                required: [surveys]

  /surveys/{id}:
    get:
      operationId: getSurvey
      tags: [surveys]
      summary: Get a single survey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Survey found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyResponse"
        "404":
          description: Not found

  /projects:
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project with context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
    get:
      operationId: getProjects
      tags: [projects]
      summary: Get all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectResponse"
                required: [projects]

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "404":
          description: Not found
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
        "500":
          description: Failed to generate upload URL.

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.

  /messages:
    post:
      operationId: generateMessage
      tags: [messages]
      summary: Generate an AI message for a stakeholder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateMessageInput"
      responses:
        "201":
          description: Message generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get all messages
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/MessageResponse"
                required: [messages]

  /messages/{id}:
    get:
      operationId: getMessage
      tags: [messages]
      summary: Get a single message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    put:
      operationId: updateMessage
      tags: [messages]
      summary: Update (edit/approve) a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMessageInput"
      responses:
        "200":
          description: Message updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /messages/{id}/send-email:
    post:
      operationId: sendMessageEmail
      tags: [messages]
      summary: Send a message to the stakeholder via email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailInput"
      responses:
        "200":
          description: Email sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEmailResponse"
        "404":
          description: Message or survey not found
        "500":
          description: Failed to send email

  /dashboard/ai-summary:
    post:
      operationId: generateAiSummary
      tags: [dashboard]
      summary: Generate an AI summary of the stakeholder landscape
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSummaryInput"
      responses:
        "200":
          description: AI summary generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSummaryResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics including mental model distribution
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SurveyInput:
      type: object
      properties:
        stakeholderName:
          type: string
        stakeholderEmail:
          type: string
          format: email
        role:
          type: string
        thinkingFocus:
          type: string
          enum: [Proof, Process, People, Possibility]
        orientation:
          type: string
          enum: [Eager, Cautious]
        changeRole:
          type: string
          enum: [Rockstar, Roadie]
        projectId:
          type: integer
          nullable: true
      required: [stakeholderName, stakeholderEmail, role, thinkingFocus, orientation, changeRole]

    SurveyResponse:
      type: object
      properties:
        id:
          type: integer
        stakeholderName:
          type: string
        stakeholderEmail:
          type: string
        role:
          type: string
        thinkingFocus:
          type: string
        orientation:
          type: string
        changeRole:
          type: string
        mentalModel:
          type: string
        mentalModelDescription:
          type: string
        projectId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, stakeholderName, stakeholderEmail, role, thinkingFocus, orientation, changeRole, mentalModel, mentalModelDescription, createdAt]

    ProjectInput:
      type: object
      properties:
        name:
          type: string
        bcipCanvas:
          type: string
          nullable: true
        changeLogic:
          type: string
          nullable: true
        changeStrategy:
          type: string
          nullable: true
        managerName:
          type: string
          nullable: true
      required: [name]

    ProjectResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        bcipCanvas:
          type: string
          nullable: true
        changeLogic:
          type: string
          nullable: true
        changeStrategy:
          type: string
          nullable: true
        managerName:
          type: string
          nullable: true
        documentName:
          type: string
          nullable: true
        documentMimeType:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, createdAt, updatedAt]

    GenerateMessageInput:
      type: object
      properties:
        surveyId:
          type: integer
        projectId:
          type: integer
      required: [surveyId, projectId]

    UpdateMessageInput:
      type: object
      properties:
        editedContent:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, approved, sent]
      required: []

    MessageResponse:
      type: object
      properties:
        id:
          type: integer
        surveyId:
          type: integer
        projectId:
          type: integer
        stakeholderName:
          type: string
        mentalModel:
          type: string
        generatedContent:
          type: string
        editedContent:
          type: string
          nullable: true
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, surveyId, projectId, stakeholderName, mentalModel, generatedContent, status, createdAt, updatedAt]

    MentalModelCount:
      type: object
      properties:
        mentalModel:
          type: string
        count:
          type: integer
      required: [mentalModel, count]

    AiSummaryInput:
      type: object
      properties:
        projectId:
          type: integer
          nullable: true

    AiSummaryResponse:
      type: object
      properties:
        summary:
          type: string
        keyInsights:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string
        riskFlags:
          type: array
          items:
            type: string
        generatedAt:
          type: string
          format: date-time
      required: [summary, keyInsights, recommendations, riskFlags, generatedAt]

    SendEmailInput:
      type: object
      properties:
        subject:
          type: string
      required: [subject]

    SendEmailResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string

    DashboardStats:
      type: object
      properties:
        totalSurveys:
          type: integer
        totalProjects:
          type: integer
        totalMessages:
          type: integer
        approvedMessages:
          type: integer
        mentalModelDistribution:
          type: array
          items:
            $ref: "#/components/schemas/MentalModelCount"
      required: [totalSurveys, totalProjects, totalMessages, approvedMessages, mentalModelDistribution]
